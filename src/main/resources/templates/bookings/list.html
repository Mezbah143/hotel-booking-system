<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="main">
    <div class="page-header">
        <div>
            <h1>My Bookings</h1>
            <p class="meta">Review upcoming stays, booking totals, and cancellation status.</p>
        </div>
        <a class="button" th:href="@{/rooms}">Find Another Room</a>
    </div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <div class="empty-state" th:if="${#lists.isEmpty(bookings)}">
        <h2>No bookings yet</h2>
        <p>Search available rooms and reserve your first stay.</p>
        <a class="button" th:href="@{/rooms}">Browse Rooms</a>
    </div>
    <div class="table-wrap" th:if="${!#lists.isEmpty(bookings)}">
        <table>
            <thead>
            <tr>
                <th>Room</th>
                <th>Dates</th>
                <th>Guests</th>
                <th>Total</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="booking : ${bookings}">
                <td>
                    <strong th:text="${booking.room.name}">Room</strong>
                    <div class="meta" th:text="${booking.room.city}">City</div>
                </td>
                <td th:text="${booking.checkInDate + ' to ' + booking.checkOutDate}"></td>
                <td th:text="${booking.guestCount != null ? booking.guestCount : 1}"></td>
                <td th:text="${'$' + booking.totalPrice}"></td>
                <td><span class="status" th:classappend="${booking.status.name().toLowerCase()}" th:text="${booking.status}"></span></td>
                <td>
                    <div class="actions">
                        <a class="button secondary" th:href="@{/bookings/{id}(id=${booking.id})}">Details</a>
                        <form th:if="${booking.status.name() == 'BOOKED'}" th:action="@{/bookings/{id}/cancel(id=${booking.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="danger" type="submit">Cancel</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
