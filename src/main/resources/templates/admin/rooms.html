<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Rooms</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar">
    <nav class="nav">
        <a class="brand" th:href="@{/}">Hotel Booking</a>
        <div class="nav-links">
            <a th:href="@{/rooms}">Rooms</a>
            <a th:href="@{/bookings}">My Bookings</a>
            <a th:href="@{/admin/rooms}">Admin</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="button secondary">Logout</button>
            </form>
        </div>
    </nav>
</header>
<main class="main">
    <div class="section-head">
        <div>
            <h1>Admin Room Management</h1>
            <p class="meta">Create, update, delete, and hide room records.</p>
        </div>
        <a class="button" th:href="@{/admin/rooms/new}">Add Room</a>
    </div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Room</th>
                <th>City</th>
                <th>Type</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="room : ${rooms}">
                <td th:text="${room.name}">Room</td>
                <td th:text="${room.city}">City</td>
                <td th:text="${room.roomType}">Type</td>
                <td th:text="${'$' + room.pricePerNight}">$80</td>
                <td>
                    <span class="status" th:classappend="${room.available ? 'available' : 'hidden'}"
                          th:text="${room.available ? 'Available' : 'Hidden'}"></span>
                </td>
                <td>
                    <div class="actions">
                        <a class="button secondary" th:href="@{/admin/rooms/{id}/edit(id=${room.id})}">Edit</a>
                        <form th:action="@{/admin/rooms/{id}/delete(id=${room.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="danger" type="submit">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
