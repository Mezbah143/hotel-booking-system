<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Rooms</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="main">
    <div class="page-header">
        <div>
            <p class="eyebrow">Administration</p>
            <h1>Admin Room Management</h1>
            <p class="meta">Create, update, hide, and add persistent images to room records.</p>
        </div>
        <div class="actions">
            <a class="button secondary" th:href="@{/admin}">Dashboard</a>
            <a class="button" th:href="@{/admin/rooms/new}">Add Room</a>
        </div>
    </div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Image</th>
                <th>Room</th>
                <th>City</th>
                <th>Type</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="room : ${rooms}">
                <td><img class="room-thumb"
                         th:src="${room.hasStoredImage() ? '/rooms/' + room.id + '/image' : room.imagePath}"
                         th:alt="${room.name}"></td>
                <td th:text="${room.name}">Room</td>
                <td th:text="${room.city}">City</td>
                <td th:text="${room.roomType}">Type</td>
                <td th:text="${'$' + room.pricePerNight}">$80</td>
                <td>
                    <span class="status" th:classappend="${room.available ? 'available' : 'hidden'}"
                          th:text="${room.available ? 'Available' : 'Hidden'}"></span>
                </td>
                <td>
                    <div class="actions">
                        <a class="button secondary" th:href="@{/admin/rooms/{id}/edit(id=${room.id})}">Edit</a>
                        <form th:action="@{/admin/rooms/{id}/delete(id=${room.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="danger" type="submit">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
