<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="main">
    <div class="page-header">
        <div>
            <p class="eyebrow">Administration</p>
            <h1>Booking Management</h1>
            <p class="meta">Review every reservation and cancel active bookings when required.</p>
        </div>
        <a class="button secondary" th:href="@{/admin}">Dashboard</a>
    </div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <div class="empty-state" th:if="${#lists.isEmpty(bookings)}"><h2>No bookings found</h2></div>
    <div class="table-wrap" th:if="${!#lists.isEmpty(bookings)}">
        <table>
            <thead><tr><th>Guest</th><th>Room</th><th>Dates</th><th>Guests</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>
            <tr th:each="booking : ${bookings}">
                <td><strong th:text="${booking.user.name}"></strong><div class="meta" th:text="${booking.user.email}"></div></td>
                <td><strong th:text="${booking.room.name}"></strong><div class="meta" th:text="${booking.room.city}"></div></td>
                <td th:text="${booking.checkInDate + ' to ' + booking.checkOutDate}"></td>
                <td th:text="${booking.guestCount != null ? booking.guestCount : 1}"></td>
                <td th:text="${'$' + booking.totalPrice}"></td>
                <td><span class="status" th:classappend="${booking.status.name().toLowerCase()}" th:text="${booking.status}"></span></td>
                <td>
                    <form th:if="${booking.status.name() == 'BOOKED'}" th:action="@{/admin/bookings/{id}/cancel(id=${booking.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="danger" type="submit">Cancel</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
