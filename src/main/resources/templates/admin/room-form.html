<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle}">Room Form</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="main">
    <section class="panel">
        <p class="eyebrow">Room inventory</p>
        <h1 th:text="${formTitle}">Room Form</h1>
        <form class="form-grid" th:action="@{/admin/rooms}" th:object="${room}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{imagePath}">
            <div class="two-col">
                <label>
                    Room Name
                    <input class="form-control" th:field="*{name}" required>
                    <span class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </label>
                <label>
                    City
                    <input class="form-control" th:field="*{city}" required>
                    <span class="error-text" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></span>
                </label>
            </div>
            <div class="two-col">
                <label>
                    Room Type
                    <input class="form-control" th:field="*{roomType}" placeholder="Standard, Deluxe, Family" required>
                    <span class="error-text" th:if="${#fields.hasErrors('roomType')}" th:errors="*{roomType}"></span>
                </label>
                <label>
                    Capacity
                    <input class="form-control" type="number" min="1" th:field="*{capacity}" required>
                    <span class="error-text" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></span>
                </label>
            </div>
            <label>
                Price Per Night
                <input class="form-control" type="number" min="1" step="0.01" th:field="*{pricePerNight}" required>
                <span class="error-text" th:if="${#fields.hasErrors('pricePerNight')}" th:errors="*{pricePerNight}"></span>
            </label>
            <label>
                Description
                <textarea class="form-control" th:field="*{description}" required></textarea>
                <span class="error-text" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </label>
            <label>
                Room Image
                <input class="form-control" type="file" name="imageFile" accept="image/*">
                <span class="meta">JPEG, PNG, GIF, or WebP up to 5 MB. Images are stored in MySQL.</span>
                <span class="error-text" th:if="${#fields.hasErrors('imageData')}" th:errors="*{imageData}"></span>
            </label>
            <div class="current-image" th:if="${room.id != null}">
                <span class="meta">Current image</span>
                <img class="room-thumb large"
                     th:src="${room.hasStoredImage() ? '/rooms/' + room.id + '/image' : room.imagePath}"
                     th:alt="${room.name}">
            </div>
            <label>
                <span>
                    <input type="checkbox" th:field="*{available}">
                    Available
                </span>
            </label>
            <div class="actions">
                <button type="submit">Save Room</button>
                <a class="button secondary" th:href="@{/admin/rooms}">Cancel</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
