<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${room.name}">Room Details</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="main">
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>

    <section class="detail-layout">
        <div>
            <img class="room-image detail-image"
                 th:src="${room.hasStoredImage() ? '/rooms/' + room.id + '/image' : room.imagePath}"
                 th:alt="${room.name}">
            <h1 th:text="${room.name}">Room name</h1>
            <p class="meta" th:text="${room.city + ' / ' + room.roomType + ' / Up to ' + room.capacity + ' guests'}"></p>
            <p th:text="${room.description}">Room description</p>
        </div>

        <aside class="panel">
            <p class="price" th:text="${'$' + room.pricePerNight + ' / night'}">$80 / night</p>
            <form sec:authorize="isAuthenticated()" class="form-grid" th:action="@{/bookings}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="roomId" th:value="${room.id}">
                <label>
                    Check-in
                    <input class="form-control" type="date" name="checkInDate" th:min="${today}"
                           th:value="${checkInDate}" required>
                </label>
                <label>
                    Check-out
                    <input class="form-control" type="date" name="checkOutDate" th:min="${today.plusDays(1)}"
                           th:value="${checkOutDate}" required>
                </label>
                <label>
                    Guests
                    <input class="form-control" type="number" name="guestCount" min="1" th:max="${room.capacity}"
                           th:value="${guests}" required>
                </label>
                <label>
                    Special request <span class="optional">Optional</span>
                    <textarea class="form-control compact-textarea" name="specialRequest" maxlength="500"
                              placeholder="Accessibility needs, arrival note, or room preference"></textarea>
                </label>
                <button type="submit">Book Room</button>
            </form>
            <div sec:authorize="!isAuthenticated()">
                <p>Please login to book this room.</p>
                <a class="button" th:href="@{/login}">Login</a>
            </div>
        </aside>
    </section>
</main>
</body>
</html>
