<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${room.name}">Room Details</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar">
    <nav class="nav">
        <a class="brand" th:href="@{/}">Hotel Booking</a>
        <div class="nav-links">
            <a th:href="@{/rooms}">Rooms</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/bookings}">My Bookings</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/rooms}">Admin</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/register}">Register</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="button secondary">Logout</button>
            </form>
        </div>
    </nav>
</header>
<main class="main">
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>

    <section class="detail-layout">
        <div>
            <img class="room-image" th:src="${room.imagePath}" th:alt="${room.name}">
            <h1 th:text="${room.name}">Room name</h1>
            <p class="meta" th:text="${room.city + ' / ' + room.roomType + ' / Up to ' + room.capacity + ' guests'}"></p>
            <p th:text="${room.description}">Room description</p>
        </div>

        <aside class="panel">
            <p class="price" th:text="${'$' + room.pricePerNight + ' / night'}">$80 / night</p>
            <form sec:authorize="isAuthenticated()" class="form-grid" th:action="@{/bookings}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="roomId" th:value="${room.id}">
                <label>
                    Check-in
                    <input class="form-control" type="date" name="checkInDate" th:min="${today}" required>
                </label>
                <label>
                    Check-out
                    <input class="form-control" type="date" name="checkOutDate" th:min="${today.plusDays(1)}" required>
                </label>
                <button type="submit">Book Room</button>
            </form>
            <div sec:authorize="!isAuthenticated()">
                <p>Please login to book this room.</p>
                <a class="button" th:href="@{/login}">Login</a>
            </div>
        </aside>
    </section>
</main>
</body>
</html>
