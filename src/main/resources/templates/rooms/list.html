<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="main">
    <div class="page-header">
        <div>
            <h1>Available Rooms</h1>
            <p class="meta">Compare rooms that match your destination, group size, budget, and travel dates.</p>
        </div>
    </div>
    <form class="filter-panel" th:action="@{/rooms}" th:object="${search}" method="get">
        <div class="filter-grid">
            <label class="filter-wide">
                Keyword
                <input class="form-control" type="search" th:field="*{keyword}" placeholder="Hotel, city, or room type">
            </label>
            <label>
                City
                <select class="form-control" th:field="*{city}">
                    <option value="">All cities</option>
                    <option th:each="cityOption : ${cities}" th:value="${cityOption}" th:text="${cityOption}"></option>
                </select>
            </label>
            <label>
                Room type
                <select class="form-control" th:field="*{roomType}">
                    <option value="">All types</option>
                    <option th:each="typeOption : ${roomTypes}" th:value="${typeOption}" th:text="${typeOption}"></option>
                </select>
            </label>
            <label>
                Guests
                <input class="form-control" type="number" min="1" th:field="*{guests}" placeholder="Any">
            </label>
            <label>
                Max price / night
                <input class="form-control" type="number" min="1" step="0.01" th:field="*{maxPrice}" placeholder="Any">
            </label>
            <label>
                Check-in
                <input class="form-control" type="date" th:field="*{checkInDate}" th:min="${today}">
            </label>
            <label>
                Check-out
                <input class="form-control" type="date" th:field="*{checkOutDate}" th:min="${today.plusDays(1)}">
            </label>
        </div>
        <div class="actions">
            <button type="submit">Search Availability</button>
            <a class="button secondary" th:href="@{/rooms}">Clear</a>
        </div>
    </form>
    <div class="alert error" th:if="${searchError}" th:text="${searchError}"></div>
    <div class="results-summary" th:if="${!#lists.isEmpty(rooms)}">
        <strong th:text="${#lists.size(rooms)}">0</strong>
        <span>rooms matched your search</span>
    </div>
    <div class="empty-state" th:if="${#lists.isEmpty(rooms) and searchError == null}">
        <h2>No rooms found</h2>
        <p>Try clearing a filter, increasing the price, or choosing different dates.</p>
    </div>
    <section class="grid">
        <article class="card" th:each="room : ${rooms}">
            <img class="room-image"
                 th:src="${room.hasStoredImage() ? '/rooms/' + room.id + '/image' : room.imagePath}"
                 th:alt="${room.name}">
            <div class="card-body">
                <p class="meta" th:text="${room.city + ' / ' + room.roomType + ' / ' + room.capacity + ' guests'}"></p>
                <h3 th:text="${room.name}">Room name</h3>
                <p th:text="${room.description}">Description</p>
                <p class="price" th:text="${'$' + room.pricePerNight + ' / night'}">$80 / night</p>
                <a class="button" th:href="@{/rooms/{id}(id=${room.id},checkInDate=${search.checkInDate},checkOutDate=${search.checkOutDate},guests=${search.guests})}">View Room</a>
            </div>
        </article>
    </section>
</main>
</body>
</html>
