<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar">
    <nav class="nav">
        <a class="brand" th:href="@{/}">Hotel Booking</a>
        <div class="nav-links">
            <a th:href="@{/rooms}">Rooms</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/bookings}">My Bookings</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/rooms}">Admin</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/register}">Register</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="button secondary">Logout</button>
            </form>
        </div>
    </nav>
</header>
<main class="main">
    <div class="section-head">
        <div>
            <h1>Available Rooms</h1>
            <p class="meta">Search by city, room type, name, or description.</p>
        </div>
    </div>
    <form class="search-row" th:action="@{/rooms}" method="get">
        <input type="search" name="keyword" th:value="${keyword}" placeholder="Example: Seoul, suite, family">
        <button type="submit">Search</button>
    </form>
    <p class="meta" th:if="${#lists.isEmpty(rooms)}">No available rooms matched your search.</p>
    <section class="grid">
        <article class="card" th:each="room : ${rooms}">
            <img class="room-image" th:src="${room.imagePath}" th:alt="${room.name}">
            <div class="card-body">
                <p class="meta" th:text="${room.city + ' / ' + room.roomType + ' / ' + room.capacity + ' guests'}"></p>
                <h3 th:text="${room.name}">Room name</h3>
                <p th:text="${room.description}">Description</p>
                <p class="price" th:text="${'$' + room.pricePerNight + ' / night'}">$80 / night</p>
                <a class="button" th:href="@{/rooms/{id}(id=${room.id})}">View Room</a>
            </div>
        </article>
    </section>
</main>
</body>
</html>
