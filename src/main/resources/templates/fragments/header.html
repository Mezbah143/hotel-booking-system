<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header class="topbar" th:fragment="siteHeader">
    <nav class="nav">
        <a class="brand" th:href="@{/}">Hotel Booking</a>
        <div class="nav-links">
            <a th:href="@{/rooms}">Find Rooms</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/bookings}">My Bookings</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Admin</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
            <a sec:authorize="!isAuthenticated()" class="button compact" th:href="@{/register}">Register</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="button secondary compact">Logout</button>
            </form>
        </div>
    </nav>
</header>
</body>
</html>
