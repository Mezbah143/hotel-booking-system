<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking System</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/header :: siteHeader}"></header>
<main class="main">
    <section class="hero">
        <div class="hero-content">
            <h1>Hotel Booking System</h1>
            <p>Find an available room by destination and dates, then manage your stay in one place.</p>
            <form class="hero-search" th:action="@{/rooms}" method="get">
                <input class="form-control" type="search" name="keyword" aria-label="Destination or room"
                       placeholder="City, room type, or hotel name">
                <input class="form-control" type="date" name="checkInDate" th:min="${today}" aria-label="Check-in date">
                <input class="form-control" type="date" name="checkOutDate" th:min="${today.plusDays(1)}" aria-label="Check-out date">
                <input class="form-control" type="number" name="guests" min="1" value="1" aria-label="Guests">
                <button type="submit">Find Rooms</button>
            </form>
        </div>
    </section>

    <div class="section-head">
        <h2>Featured Rooms</h2>
        <a class="button secondary" th:href="@{/rooms}">View All</a>
    </div>

    <section class="grid">
        <article class="card" th:each="room : ${rooms}">
            <img class="room-image"
                 th:src="${room.hasStoredImage() ? '/rooms/' + room.id + '/image' : room.imagePath}"
                 th:alt="${room.name}">
            <div class="card-body">
                <p class="meta" th:text="${room.city + ' / ' + room.roomType}">Seoul / Deluxe</p>
                <h3 th:text="${room.name}">Room name</h3>
                <p th:text="${room.description}">Description</p>
                <p class="price" th:text="${'$' + room.pricePerNight + ' / night'}">$80 / night</p>
                <a class="button" th:href="@{/rooms/{id}(id=${room.id})}">View Room</a>
            </div>
        </article>
    </section>
</main>
</body>
</html>
